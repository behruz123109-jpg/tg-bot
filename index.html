<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>3D Gold Miner</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
    <div class="header">
        <h3 style="margin:0; color:#66fcf1;">⚡ 3D Miner Pro</h3>
        <div class="balances">
            <div class="balance-box">
                <span style="font-size:12px; color:#aaa;">🟡 Tanga</span>
                <div class="coin-count" id="coinBalance">0</div>
            </div>
            <div class="balance-box">
                <span style="font-size:12px; color:#aaa;">💎 Olmos</span>
                <div class="uc-count" id="chipBalance">0</div>
            </div>
        </div>
    </div>

    <div class="tap-area" id="tapArea">
        <div class="main-coin" id="coinBtn">👑</div>
    </div>

    <div class="energy-container">
        <div style="font-size:14px; font-weight:bold; margin-bottom:5px;">⚡ Energiya: <span id="energyText">1000</span>/1000</div>
        <div class="energy-bar-bg">
            <div class="energy-bar-fill" id="energyFill"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
